services:
  - type: web
    name: pisa-backend
    runtime: node
    buildCommand: "cd backend/functions && npm install && npm run build"
    startCommand: "cd backend/functions && npm start"
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: PORT
        value: "10000"
